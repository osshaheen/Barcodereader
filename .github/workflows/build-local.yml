name: Build local (pre-Firebase) APK

# Manually triggered. Builds the local Room/POS version (the release before the
# Firebase one) and publishes it to its own 'local-debug' release, so it does not
# clobber the current 'latest-debug' (Firebase) APK.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the pre-Firebase commit
        uses: actions/checkout@v4
        with:
          ref: 44fe4a875dd72af8b6159cd2454dad16c04f65ee

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Publish to local-debug release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: local-debug
          name: Local (pre-Firebase) debug build
          body: |
            Standalone local version — full POS (products, orders, customers,
            debts/payments) with an on-device database and no login. This is the
            release before the Firebase migration.
          files: app/build/outputs/apk/debug/app-debug.apk
