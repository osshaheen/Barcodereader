name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Publish to a Release first — this is the reliable, direct download link.
      - name: Publish APK to a Release (direct download link)
        if: github.ref_name == 'master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest debug build
          body: |
            Direct-install debug APK of the Multi Barcode Reader.
            Built automatically from the latest push.
          files: app/build/outputs/apk/debug/app-debug.apk

      # Best-effort artifact upload; never fail the job if blob storage rejects it.
      - name: Upload debug APK artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: multi-barcode-reader-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
