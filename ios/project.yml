name: MultiBarcode
options:
  bundleIdPrefix: com.baghd
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: ar
  # Keep the pbxproj readable by a range of Xcode versions on the CI runner.
  objectVersion: 56

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

targets:
  MultiBarcode:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baghd.barcode
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: "قارئ الباركود"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "تُستخدم الكاميرا لمسح الباركود وأخذ صور المنتجات."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.618919396372-sb8v7un1t1di0bkui9h0925u1iv5knlj"

schemes:
  MultiBarcode:
    build:
      targets:
        MultiBarcode: all
    run:
      config: Debug
